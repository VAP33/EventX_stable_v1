<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard — MMCOE Event Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div id="_nav"></div>
<div id="_notif"></div>

<div class="app">
  <div id="_side"></div>
  <main class="main">
    <div class="ph">
      <div>
        <h1>Welcome back, <span id="greetName">Student</span> </h1>
        <p>Here's what's happening with your events.</p>
      </div>
    </div>

    <div class="stats" id="statsRow">
      <div class="stat"><div><div class="stat-num" id="sReg">—</div><div class="stat-lbl">Events Registered</div></div><div class="stat-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div></div>
      <div class="stat"><div><div class="stat-num" id="sUp">—</div><div class="stat-lbl">Upcoming Events</div></div><div class="stat-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div></div>
      <div class="stat"><div><div class="stat-num" id="sCerts">0</div><div class="stat-lbl">Certificates Earned</div></div><div class="stat-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg></div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 320px;gap:1.25rem;align-items:start">
      <div>
        <div class="card" style="margin-bottom:1.25rem">
          <div class="card-hd">
            <h2>Upcoming Events</h2>
            <a href="events.html" class="btn btn-ghost btn-sm">View all →</a>
          </div>
          <div id="upcomingList" style="padding:0.5rem 0">
            <div class="empty"><div class="icon">⏳</div><p>Loading…</p></div>
          </div>
        </div>

        <div class="card">
          <div class="card-hd">
            <h2>My Scorecard</h2>
            <span style="font-size:0.72rem;color:var(--muted)">Competition results</span>
          </div>
          <div id="scorecardList">
            <div class="empty" style="padding:1.5rem"><p>Loading…</p></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-hd">
          <h2>Notifications</h2>
          <button class="btn btn-ghost btn-sm" onclick="markAllRead()">Mark all read</button>
        </div>
        <div id="notifInline" style="padding:0">
          <div class="empty"><div class="icon">⏳</div><p>Loading…</p></div>
        </div>
        <div style="padding:0.75rem 1.1rem;border-top:1px solid var(--border);text-align:center">
          <button class="btn btn-ghost btn-sm" id="dashNotifMore" onclick="dashLoadMoreNotifs()" style="display:none">Load more</button>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="../js/auth.js"></script>
<script src="../js/shared.js"></script>
<script>
const user = requireAuth();
if (!user) throw '';

document.getElementById('_nav').innerHTML = renderTopnav('dashboard');
document.getElementById('_side').innerHTML = renderStudentSidebar('dashboard');
document.getElementById('_notif').innerHTML = renderNotifDrawer();
document.getElementById('greetName').textContent = user.name?.split(' ')[0] || 'Student';

let _dashNotifs = [];
let _dashNotifPage = 1;
const _dashNotifPageSize = 5;

async function loadUpcoming() {
  try {
    const r = await fetch(API + "/events/upcoming");
    const d = await r.json();
    const list = document.getElementById('upcomingList');
    document.getElementById('sUp').textContent = Array.isArray(d) ? d.length : 0;
    if (!Array.isArray(d) || !d.length) {
      list.innerHTML = '<div class="empty"><div class="icon"></div><p>No upcoming events</p></div>';
      return;
    }
    list.innerHTML = d.slice(0, 5).map((e, i) => `
      <a href="event-details.html?id=${e.id}" style="display:flex;align-items:center;gap:1rem;padding:0.85rem 1.25rem;border-bottom:1px solid #f3f4f6;text-decoration:none;color:inherit;transition:background 0.15s" onmouseenter="this.style.background='#fafafa'" onmouseleave="this.style.background=''">
        <img src="${getImg(e, i)}" style="width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0;background:#e5e7eb" loading="lazy" onerror="this.src='${IMGS[0]}'"/>
        <div style="flex:1;min-width:0">
          <div style="font-size:0.88rem;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.title}</div>
          <div style="font-size:0.74rem;color:var(--muted)"> ${fmtDate(e.date)} ·  ${e.venue || 'TBD'}</div>
        </div>
        <div style="font-size:0.7rem;color:var(--navy);font-weight:600;white-space:nowrap">→</div>
      </a>`).join('');
  } catch (e) {
    document.getElementById('upcomingList').innerHTML = '<div class="empty"><p>Could not load events.</p></div>';
  }
}

async function loadMyCount() {
  try {
    const r = await fetch(API + "/my-registrations", { headers: authHeaders() });
    const d = await r.json();
    document.getElementById('sReg').textContent = Array.isArray(d) ? d.length : '0';
  } catch (e) { document.getElementById('sReg').textContent = '0'; }
}

async function loadCertCount() {
  try {
    const r = await fetch(API + "/certificates", { headers: authHeaders() });
    const d = await r.json();
    document.getElementById('sCerts').textContent = Array.isArray(d) ? d.length : '0';
  } catch (e) {}
}

async function loadScorecard() {
  try {
    const r = await fetch(API + "/my-scores", { headers: authHeaders() });
    const d = await r.json();
    const el = document.getElementById('scorecardList');
    if (!Array.isArray(d) || !d.length) {
      el.innerHTML = '<div class="empty" style="padding:1.5rem"><p style="font-size:0.82rem">No competition scores yet. Participate in competitive events!</p></div>';
      return;
    }
    el.innerHTML = d.map((s, i) => {
      const rankCls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
      return `<div class="scorecard-row">
        <div class="scorecard-rank ${rankCls}">${s.position ? (i + 1) : '—'}</div>
        <div style="flex:1;min-width:0">
          <div class="scorecard-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.event_title}</div>
          <div style="font-size:0.72rem;color:var(--muted)">${s.position || 'Participant'} · ${fmtDate(s.event_date)}</div>
        </div>
        <div class="scorecard-score">${s.score != null ? s.score + ' pts' : '—'}</div>
      </div>`;
    }).join('');
  } catch (e) {
    document.getElementById('scorecardList').innerHTML = '<div class="empty" style="padding:1.5rem"><p style="font-size:0.82rem">Could not load scores.</p></div>';
  }
}

async function loadDashNotifs() {
  try {
    const r = await fetch(API + "/notifications", { headers: authHeaders() });
    _dashNotifs = await r.json();
    if (!Array.isArray(_dashNotifs)) _dashNotifs = [];
    const unread = _dashNotifs.filter(n => !n.is_read).length;
    const badge = document.getElementById('bellBadge');
    if (badge && unread > 0) { badge.textContent = unread; badge.style.display = 'flex'; }
    renderDashNotifs();
  } catch (e) {
    document.getElementById('notifInline').innerHTML = '<div class="empty"><p>Could not load notifications.</p></div>';
  }
}

function renderDashNotifs() {
  const el = document.getElementById('notifInline');
  const moreBtn = document.getElementById('dashNotifMore');
  const slice = _dashNotifs.slice(0, _dashNotifPage * _dashNotifPageSize);
  if (!slice.length) { el.innerHTML = '<div class="empty" style="padding:1.5rem"><p>No notifications</p></div>'; if (moreBtn) moreBtn.style.display = 'none'; return; }
  el.innerHTML = slice.map(n => `
    <div class="notif-item ${n.is_read ? '' : 'unread'}" style="padding:0.7rem 1.1rem">
      <div class="notif-dot ${n.is_read ? 'grey' : 'blue'}"></div>
      <div>
        <div class="notif-text" style="font-weight:${n.is_read ? 400 : 600}">${n.title || 'Notification'}</div>
        ${n.description ? `<div class="notif-desc">${n.description}</div>` : ''}
        <div class="notif-time">${fmtDate(n.created_at, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</div>
      </div>
    </div>`).join('');
  if (moreBtn) moreBtn.style.display = _dashNotifs.length > _dashNotifPage * _dashNotifPageSize ? 'block' : 'none';
}

function dashLoadMoreNotifs() { _dashNotifPage++; renderDashNotifs(); }

async function markAllRead() {
  try {
    await fetch(API + "/notifications/read-all", { method: 'PUT', headers: authHeaders() });
    _dashNotifs.forEach(n => n.is_read = 1);
    const badge = document.getElementById('bellBadge');
    if (badge) badge.style.display = 'none';
    renderDashNotifs();
  } catch (e) {}
}

loadUpcoming(); loadMyCount(); loadCertCount(); loadScorecard(); loadDashNotifs();
fetchAndRenderNotifs();
</script>
</body>
</html>
