<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Event — EventX Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .page-wrap   { max-width:820px; margin:0 auto; padding:2rem 1.5rem 5rem; }
    .page-header { margin-bottom:2rem; }
    .page-header h1 { font-size:1.9rem; color:var(--navy); }
    .page-header p  { color:var(--text-muted); font-size:0.88rem; margin-top:3px; }

    .form-card {
      background:var(--white); border-radius:var(--radius);
      border:1px solid var(--border); box-shadow:var(--shadow-sm);
      padding:2rem; margin-bottom:1.5rem;
    }
    .section-heading {
      font-size:1rem; font-weight:700; color:var(--navy);
      margin-bottom:1.2rem; padding-bottom:0.6rem;
      border-bottom:2px solid var(--bg);
      display:flex; align-items:center; gap:0.5rem;
    }
    .form-row   { margin-bottom:1.1rem; }
    .form-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .form-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; }

    /* Timeline builder */
    .timeline-builder { display:flex; flex-direction:column; gap:0.6rem; }
    .tl-step-row {
      display:flex; gap:0.6rem; align-items:center;
      background:#f8faff; border:1px solid var(--border);
      border-radius:var(--radius-sm); padding:0.6rem 0.8rem;
      transition:box-shadow 0.15s;
    }
    .tl-step-row:hover { box-shadow:var(--shadow-sm); }
    .tl-step-num {
      width:28px; height:28px; border-radius:50%;
      background:var(--navy); color:var(--white);
      display:flex; align-items:center; justify-content:center;
      font-size:0.75rem; font-weight:700; flex-shrink:0;
    }
    .tl-step-row input[type="text"] {
      flex:1; padding:7px 10px;
      border:1.5px solid var(--border); border-radius:var(--radius-xs);
      font-family:var(--font); font-size:0.85rem; color:var(--text-main);
      background:var(--white);
    }
    .tl-step-row input[type="text"]:focus {
      outline:none; border-color:var(--navy);
    }
    .tl-step-row input[type="date"] {
      padding:7px 8px;
      border:1.5px solid var(--border); border-radius:var(--radius-xs);
      font-family:var(--font); font-size:0.82rem; color:var(--text-main);
      background:var(--white); width:140px;
    }
    .tl-done-toggle {
      display:flex; align-items:center; gap:4px;
      font-size:0.72rem; color:var(--text-muted); white-space:nowrap;
    }
    .tl-done-toggle input[type="checkbox"] { accent-color:var(--navy); }
    .btn-remove-step {
      background:none; border:none; cursor:pointer;
      color:#9ca3af; font-size:1.1rem; transition:color 0.15s; padding:2px 4px;
    }
    .btn-remove-step:hover { color:var(--danger); }
    .btn-add-step {
      background:none; border:2px dashed var(--border);
      border-radius:var(--radius-sm); padding:8px;
      font-family:var(--font); font-size:0.82rem; font-weight:600;
      color:var(--text-muted); cursor:pointer; transition:all 0.18s;
      text-align:center;
    }
    .btn-add-step:hover { border-color:var(--navy); color:var(--navy); }

    /* Form actions */
    .form-actions {
      display:flex; gap:1rem; justify-content:flex-end;
      padding-top:0.5rem;
    }

    /* Poster preview */
    .poster-preview {
      margin-top:0.5rem; display:none;
      border-radius:var(--radius-sm); overflow:hidden;
      border:1px solid var(--border); max-width:200px;
    }
    .poster-preview img { width:100%; display:block; }

    @media(max-width:600px){
      .form-grid-2 { grid-template-columns:1fr; }
      .form-grid-3 { grid-template-columns:1fr 1fr; }
      .tl-step-row input[type="date"] { width:120px; }
    }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<nav class="topnav">
  <a class="nav-brand" href="admin-dashboard.html">Event<span>X</span>
    <span style="font-size:0.6rem;background:rgba(245,166,35,0.2);color:var(--amber);
                 padding:2px 7px;border-radius:99px;margin-left:6px;vertical-align:middle;
                 font-weight:700;letter-spacing:.5px;">ADMIN</span>
  </a>
  <div class="nav-right">
    <a class="nav-link" href="admin-dashboard.html">← Dashboard</a>
    <button class="nav-link always-show" onclick="logout()">Logout</button>
    <div class="nav-avatar" id="navAvatar">A</div>
  </div>
</nav>

<div class="page-wrap">

  <div class="page-header fade-in">
    <h1> Create New Event</h1>
    <p>Fill in the details below to publish a new event for students.</p>
  </div>

  
  <div class="form-card fade-in">
    <div class="section-heading"> Basic Details</div>

    <div class="form-row">
      <label class="form-label">Event Title *</label>
      <input class="form-input" id="title" type="text" placeholder="e.g. Dexterity 2K26 — Robotics Challenge"/>
    </div>

    <div class="form-row">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="description"
                placeholder="Describe the event, rules, eligibility…"></textarea>
    </div>

    <div class="form-grid-2">
      <div class="form-row">
        <label class="form-label">Category</label>
        <select class="form-select" id="category">
          <option value="Technical">Technical</option>
          <option value="Coding">Coding</option>
          <option value="Cultural">Cultural</option>
          <option value="Sports">Sports</option>
          <option value="Workshop">Workshop</option>
          <option value="Quiz">Quiz</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">Venue *</label>
        <input class="form-input" id="venue" type="text" placeholder="e.g. Main Auditorium, Block A"/>
      </div>
    </div>

    <div class="form-grid-3">
      <div class="form-row">
        <label class="form-label">Event Date & Time *</label>
        <input class="form-input" id="date" type="datetime-local"/>
      </div>
      <div class="form-row">
        <label class="form-label">Registration Deadline</label>
        <input class="form-input" id="regDeadline" type="datetime-local"/>
      </div>
      <div class="form-row">
        <label class="form-label">Max Participants</label>
        <input class="form-input" id="maxPart" type="number" min="1" placeholder="e.g. 200"/>
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">Poster URL (optional)</label>
      <input class="form-input" id="poster" type="url"
             placeholder="https://…" oninput="previewPoster()"/>
      <div class="poster-preview" id="posterPreview">
        <img id="posterImg" src="" alt="Poster preview"/>
      </div>
    </div>
  </div>

  
  <div class="form-card fade-in">
    <div class="section-heading">️ Event Timeline
      <span style="font-size:0.72rem;font-weight:400;color:var(--text-muted)">
        — Add stages students will see on the event details page
      </span>
    </div>

    <div class="timeline-builder" id="timelineBuilder"></div>
    <button class="btn-add-step" onclick="addStep()" style="margin-top:0.75rem">
      + Add Timeline Stage
    </button>
  </div>

  
  <div class="form-actions fade-in">
    <a class="btn btn-ghost" href="admin-dashboard.html">Cancel</a>
    <button class="btn btn-primary" id="btnCreate" onclick="createEvent()">
       Publish Event
    </button>
  </div>

</div>

<script>
const API  = "http://localhost:5000/api";
const user = JSON.parse(localStorage.getItem("user") || "null");
if (!user || user.role !== "admin") window.location.href = "login.html";
document.getElementById("navAvatar").textContent =
  user.name ? user.name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2) : "A";

function getAuthHeaders() {
  return { "Content-Type":"application/json", "Authorization":`Bearer ${user.token}` };
}

/* ── Toast ── */
function showToast(msg, type="success") {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove("show"), 3500);
}

/* ── Poster preview ── */
function previewPoster() {
  const url = document.getElementById("poster").value.trim();
  const wrap = document.getElementById("posterPreview");
  const img  = document.getElementById("posterImg");
  if (url) { img.src = url; wrap.style.display = "block"; }
  else wrap.style.display = "none";
}

/* ── Timeline builder ── */
const defaultSteps = [
  "Registration Opens", "Registration Deadline",
  "Preliminary Round", "Final Round", "Prize Distribution"
];
let steps = defaultSteps.map((label, i) => ({ label, date:"", done: i===0 }));

function renderTimeline() {
  const builder = document.getElementById("timelineBuilder");
  builder.innerHTML = steps.map((s, i) => `
    <div class="tl-step-row">
      <div class="tl-step-num">${i+1}</div>
      <input type="text" value="${s.label}"
             placeholder="Stage name"
             oninput="steps[${i}].label = this.value"/>
      <input type="date" value="${s.date}"
             oninput="steps[${i}].date = this.value"/>
      <label class="tl-done-toggle">
        <input type="checkbox" ${s.done?"checked":""}
               onchange="steps[${i}].done = this.checked"/>
        Done
      </label>
      <button class="btn-remove-step" onclick="removeStep(${i})" title="Remove"></button>
    </div>`).join("");
}

function addStep() {
  steps.push({ label:"", date:"", done:false });
  renderTimeline();
}
function removeStep(i) {
  if (steps.length <= 1) return;
  steps.splice(i, 1);
  renderTimeline();
}

/* ── Create Event ── */
async function createEvent() {
  const title    = document.getElementById("title").value.trim();
  const date     = document.getElementById("date").value;
  const venue    = document.getElementById("venue").value.trim();

  if (!title)  return showToast(" Event title is required.", "error");
  if (!date)   return showToast(" Event date is required.", "error");
  if (!venue)  return showToast(" Venue is required.", "error");

  const btn = document.getElementById("btnCreate");
  btn.disabled = true; btn.textContent = "Publishing…";

  const payload = {
    title,
    description:          document.getElementById("description").value.trim(),
    date,
    registration_deadline: document.getElementById("regDeadline").value || null,
    venue,
    category:             document.getElementById("category").value,
    max_participants:     parseInt(document.getElementById("maxPart").value) || 0,
    poster:               document.getElementById("poster").value.trim() || null,
    timeline:             steps.filter(s => s.label.trim())
  };

  try {
    const res  = await fetch(`${API}/admin/events`, {
      method:  "POST",
      headers: getAuthHeaders(),
      body:    JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || "Failed to create event.");

    showToast(" Event published successfully!", "success");
    setTimeout(() => window.location.href = "admin-dashboard.html", 1500);
  } catch(err) {
    showToast(" " + err.message, "error");
    btn.disabled = false; btn.textContent = " Publish Event";
  }
}

function logout() { localStorage.removeItem("user"); window.location.href="login.html"; }

/* ── Init ── */
renderTimeline();
</script>
</body>
</html>
